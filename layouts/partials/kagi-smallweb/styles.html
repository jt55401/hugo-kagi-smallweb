{{- $params := .Site.Params.kagismallweb -}}
{{- if and $params $params.enabled -}}
<style>
.kagi-smallweb-bar {
  text-align: center;
  padding: 0.5rem 1rem;
  opacity: 0.8;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 0.75rem;
  flex-wrap: wrap;
  background-color: #e3e3e3;
}
body.colorscheme-dark .kagi-smallweb-bar {
  background-color: #383838;
}
@media (prefers-color-scheme: dark) {
  body.colorscheme-auto .kagi-smallweb-bar {
    background-color: #383838;
  }
}
.kagi-smallweb-bar a {
  color: inherit;
  text-decoration: none;
}
.kagi-smallweb-bar a:hover { text-decoration: underline; }
.kagi-smallweb-bar .ksw-sep { opacity: 0.4; }
</style>
{{- end -}}
