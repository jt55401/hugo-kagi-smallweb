{{- $params := .Site.Params.kagismallweb -}}
{{- if and $params $params.enabled -}}
<style>
.kagi-smallweb-bar {
  font-family: monospace;
  font-size: 0.8rem;
  text-align: center;
  padding: 0.5rem 1rem;
  border-top: 1px solid currentColor;
  opacity: 0.6;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 0.75rem;
  flex-wrap: wrap;
}
.kagi-smallweb-bar a {
  color: inherit;
  text-decoration: none;
}
.kagi-smallweb-bar a:hover { text-decoration: underline; }
.kagi-smallweb-bar .ksw-sep { opacity: 0.4; }
</style>
{{- end -}}
